description: >-
  OUTFRONT Media is a U.S. out-of-home (OOH) advertising company and real estate investment trust
  (NYSE: OUT) operating a national portfolio of billboards, digital displays, and transit
  advertising assets. The company runs the MTA Advertising Network across New York City's
  subways, buses, and commuter rail, along with roadside billboards, digital liveboards,
  Times Square spectaculars, and place-based displays in major U.S. markets. OUTFRONT's
  digital inventory is made available programmatically through DOOH supply-side partners
  such as Vistar Media and Place Exchange. OUTFRONT sold its Canadian operations to Bell
  Media in October 2022 to focus on the U.S. market. OUTFRONT does not publish a developer
  portal or public APIs; programmatic access to its inventory is mediated through third-party
  DOOH SSPs.
